<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1125"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#b833ff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Document icon -->
  <g transform="translate(400, 170)">
    <rect x="-50" y="-60" width="100" height="130" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
    <rect x="-50" y="-60" width="100" height="130" rx="8" fill="url(#accent)" opacity="0.05"/>
    <line x1="-30" y1="-35" x2="30" y2="-35" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-30" y1="-18" x2="20" y2="-18" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-30" y1="-1" x2="25" y2="-1" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-30" y1="16" x2="15" y2="16" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-30" y1="33" x2="22" y2="33" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-30" y1="50" x2="10" y2="50" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Magnifying glass -->
    <circle cx="70" cy="50" r="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
    <line x1="82" y1="62" x2="92" y2="72" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="600" fill="rgba(255,255,255,0.9)">DocuSense AI</text>
  <text x="400" y="126" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="2">RAG · MULTI-AGENT</text>

  <!-- Tech tags -->
  <g transform="translate(400, 340)">
    <rect x="-145" y="-10" width="48" height="20" rx="4" fill="rgba(124,77,255,0.1)" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
    <text x="-121" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(124,77,255,0.8)">RAG</text>

    <rect x="-85" y="-10" width="60" height="20" rx="4" fill="rgba(124,77,255,0.1)" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
    <text x="-55" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(124,77,255,0.8)">LangChain</text>

    <rect x="-13" y="-10" width="52" height="20" rx="4" fill="rgba(124,77,255,0.1)" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
    <text x="13" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(124,77,255,0.8)">OpenAI</text>

    <rect x="51" y="-10" width="62" height="20" rx="4" fill="rgba(124,77,255,0.1)" stroke="rgba(124,77,255,0.2)" stroke-width="1"/>
    <text x="82" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(124,77,255,0.8)">Pinecone</text>
  </g>
</svg>
