<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffab00"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Code + security icon -->
  <g transform="translate(400, 175)">
    <!-- Code brackets -->
    <text x="-90" y="10" font-family="'JetBrains Mono', monospace" font-size="60" fill="url(#accent)" opacity="0.1" font-weight="bold">&lt;</text>
    <text x="60" y="10" font-family="'JetBrains Mono', monospace" font-size="60" fill="url(#accent)" opacity="0.1" font-weight="bold">/&gt;</text>

    <!-- Code lines anim -->
    <g transform="translate(-25, -30)">
      <rect x="0" y="0" width="50" height="3" rx="1.5" fill="url(#accent)" opacity="0.4"/>
      <rect x="0" y="8" width="34" height="3" rx="1.5" fill="url(#accent)" opacity="0.25"/>
      <rect x="0" y="16" width="42" height="3" rx="1.5" fill="url(#accent)" opacity="0.3"/>
      <rect x="8" y="24" width="28" height="3" rx="1.5" fill="url(#accent)" opacity="0.2"/>
      <rect x="0" y="32" width="38" height="3" rx="1.5" fill="url(#accent)" opacity="0.25"/>
    </g>

    <!-- Security shield -->
    <g transform="translate(90, -15)">
      <path d="M0 -30 L18 -22 L18 -2 C18 14 0 24 0 24 C0 24 -18 14 -18 -2 L-18 -22 Z" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
      <path d="M0 -30 L18 -22 L18 -2 C18 14 0 24 0 24 C0 24 -18 14 -18 -2 L-18 -22 Z" fill="rgba(255,171,0,0.05)"/>
    </g>

    <!-- Checkmark in shield -->
    <g transform="translate(90, -5)">
      <polyline points="-6,0 -2,6 8,-6" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    </g>

    <!-- AST connection lines -->
    <g transform="translate(-90, -25)" opacity="0.15">
      <circle cx="0" cy="0" r="3" fill="url(#accent)"/>
      <line x1="0" y1="0" x2="20" y2="-15" stroke="url(#accent)" stroke-width="1"/>
      <circle cx="20" cy="-15" r="3" fill="url(#accent)"/>
      <line x1="0" y1="0" x2="25" y2="10" stroke="url(#accent)" stroke-width="1"/>
      <circle cx="25" cy="10" r="3" fill="url(#accent)"/>
      <line x1="20" y1="-15" x2="40" y2="-10" stroke="url(#accent)" stroke-width="1"/>
      <circle cx="40" cy="-10" r="3" fill="url(#accent)"/>
      <line x1="20" y1="-15" x2="35" y2="-25" stroke="url(#accent)" stroke-width="1"/>
      <circle cx="35" cy="-25" r="3" fill="url(#accent)"/>
    </g>
  </g>

  <text x="400" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="600" fill="rgba(255,255,255,0.9)">CodeSentry AI</text>
  <text x="400" y="126" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="2">STATIC ANALYSIS · DEVSECOPS</text>

  <!-- Tags -->
  <g transform="translate(400, 340)">
    <rect x="-145" y="-10" width="44" height="20" rx="4" fill="rgba(255,171,0,0.1)" stroke="rgba(255,171,0,0.2)" stroke-width="1"/>
    <text x="-123" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(255,171,0,0.8)">AST</text>

    <rect x="-89" y="-10" width="48" height="20" rx="4" fill="rgba(255,171,0,0.1)" stroke="rgba(255,171,0,0.2)" stroke-width="1"/>
    <text x="-65" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(255,171,0,0.8)">OpenAI</text>

    <rect x="-29" y="-10" width="62" height="20" rx="4" fill="rgba(255,171,0,0.1)" stroke="rgba(255,171,0,0.2)" stroke-width="1"/>
    <text x="2" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(255,171,0,0.8)">GitHub API</text>

    <rect x="45" y="-10" width="52" height="20" rx="4" fill="rgba(255,171,0,0.1)" stroke="rgba(255,171,0,0.2)" stroke-width="1"/>
    <text x="71" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(255,171,0,0.8)">Security</text>
  </g>
</svg>
