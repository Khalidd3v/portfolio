<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0f1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Neural network / LLM icon -->
  <g transform="translate(400, 175)">
    <!-- Input layer -->
    <circle cx="-80" cy="-60" r="8" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <circle cx="-80" cy="-20" r="8" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-80" cy="20" r="8" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="-80" cy="60" r="8" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

    <!-- Hidden layer -->
    <circle cx="0" cy="-50" r="12" fill="rgba(0,230,118,0.08)" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="12" fill="rgba(0,230,118,0.1)" stroke="url(#accent)" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="50" r="12" fill="rgba(0,230,118,0.08)" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>

    <!-- Output layer -->
    <circle cx="80" cy="-30" r="8" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="80" cy="30" r="8" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

    <!-- Connections (dense) -->
    <g opacity="0.08">
      <line x1="-72" y1="-60" x2="-12" y2="-50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="-60" x2="-12" y2="0" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="-60" x2="-12" y2="50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="-20" x2="-12" y2="-50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="-20" x2="-12" y2="0" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="-20" x2="-12" y2="50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="20" x2="-12" y2="-50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="20" x2="-12" y2="0" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="20" x2="-12" y2="50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="60" x2="-12" y2="-50" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="60" x2="-12" y2="0" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="-72" y1="60" x2="-12" y2="50" stroke="url(#accent)" stroke-width="0.5"/>
    </g>
    <g opacity="0.08">
      <line x1="12" y1="-50" x2="72" y2="-30" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="12" y1="-50" x2="72" y2="30" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="12" y1="0" x2="72" y2="-30" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="12" y1="0" x2="72" y2="30" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="12" y1="50" x2="72" y2="-30" stroke="url(#accent)" stroke-width="0.5"/>
      <line x1="12" y1="50" x2="72" y2="30" stroke="url(#accent)" stroke-width="0.5"/>
    </g>

    <!-- LoRA badge -->
    <rect x="30" y="45" width="44" height="18" rx="9" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
    <text x="52" y="58" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="url(#accent)" opacity="0.6">LoRA</text>
  </g>

  <text x="400" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="600" fill="rgba(255,255,255,0.9)">LLMForge</text>
  <text x="400" y="126" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="2">FINE-TUNING · MLOPS</text>

  <!-- Tags -->
  <g transform="translate(400, 340)">
    <rect x="-145" y="-10" width="52" height="20" rx="4" fill="rgba(0,230,118,0.1)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="-119" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(0,230,118,0.8)">PyTorch</text>

    <rect x="-81" y="-10" width="70" height="20" rx="4" fill="rgba(0,230,118,0.1)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="-46" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(0,230,118,0.8)">HuggingFace</text>

    <rect x="1" y="-10" width="34" height="20" rx="4" fill="rgba(0,230,118,0.1)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="18" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(0,230,118,0.8)">W&amp;B</text>

    <rect x="47" y="-10" width="50" height="20" rx="4" fill="rgba(0,230,118,0.1)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="72" y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(0,230,118,0.8)">FastAPI</text>
  </g>
</svg>
